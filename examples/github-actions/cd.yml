name: CD

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'examples/node-api/**'
      - 'examples/scripts/**'
      - 'examples/github-actions/cd.yml'

env:
  SERVICE_VERSION: ${{ github.sha }}

jobs:
  deploy:
    name: Deploy to staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: examples/node-api/package-lock.json

      - name: Install & build API
        working-directory: examples/node-api
        run: |
          npm ci
          npm run build

      - name: Deploy (mock)
        run: |
          chmod +x examples/scripts/*.sh
          DEPLOY_VERSION="${{ github.sha }}" ./examples/scripts/deploy-mock.sh

      - name: Start API for validation
        working-directory: examples/node-api
        run: |
          npm start &
          echo $! > /tmp/api.pid
          sleep 3

      - name: Post-deploy health check
        run: ./examples/scripts/health-check.sh http://localhost:3000/health

      - name: Stop API
        if: always()
        run: |
          if [[ -f /tmp/api.pid ]]; then
            kill "$(cat /tmp/api.pid)" 2>/dev/null || true
          fi
