apiVersion: apps/v1
kind: Deployment
metadata:
  name: observability-sensei-api
  labels:
    app: observability-sensei-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: observability-sensei-api
  template:
    metadata:
      labels:
        app: observability-sensei-api
    spec:
      containers:
        - name: api
          image: observability-sensei-api:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: SERVICE_VERSION
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['app.kubernetes.io/version']
            - name: HEALTH_MAX_ERROR_RATE
              value: "0.05"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector:4318"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
