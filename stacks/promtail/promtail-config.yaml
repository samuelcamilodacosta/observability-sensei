server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: stream
      - source_labels: ['__meta_docker_compose_service']
        target_label: compose_service
      - source_labels: ['__meta_docker_container_label_logging_observability_sensei_io_service']
        target_label: service
    pipeline_stages:
      - docker: {}
      - match:
          selector: '{compose_service="api"}'
          stages:
            - json:
                expressions:
                  level: level
                  service: service
                  version: version
                  msg: msg
                  requestId: requestId
            - labels:
                level:
                service:
                version:
