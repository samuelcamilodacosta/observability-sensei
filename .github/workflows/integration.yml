name: Integration

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  script-tests:
    name: Bash scripts · API gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: examples/node-api/package-lock.json

      - name: Install & build API
        working-directory: examples/node-api
        run: |
          npm ci
          npm run build

      - name: Start API
        working-directory: examples/node-api
        run: |
          npm start &
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/health && exit 0
            sleep 1
          done
          exit 1

      - name: Run script integration tests
        run: bash examples/scripts/run-tests.sh

  docker-stack:
    name: Docker stack smoke test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Start stack
        run: docker compose up -d --build --wait

      - name: Check Prometheus target
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -sf "http://localhost:9090/api/v1/targets" | jq -r '.data.activeTargets[0].health // "unknown"')
            echo "Target health: $STATUS"
            [[ "$STATUS" == "up" ]] && exit 0
            sleep 5
          done
          exit 1

      - name: Generate traffic & health check
        run: |
          for i in $(seq 1 10); do curl -sf http://localhost:3000/api/example; done
          curl -sf http://localhost:3000/health | grep -qE '"status"[[:space:]]*:[[:space:]]*"ok"'

      - name: Grafana health
        run: curl -sf http://localhost:3001/api/health | grep -qE '"database"[[:space:]]*:[[:space:]]*"ok"'

      - name: Jaeger UI
        run: curl -sf http://localhost:16686 | grep -qi jaeger

      - name: Loki ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3100/ready | grep -q ready; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Production Gate against stack
        run: GATE_SOAK_SECONDS=2 bash examples/scripts/production-gate.sh

      - name: Tear down
        if: always()
        run: docker compose down -v
