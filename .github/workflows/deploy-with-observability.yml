name: Deploy with Observability

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
  push:
    branches: [main]
    paths:
      - 'examples/node-api/**'
      - 'examples/scripts/**'
      - '.github/workflows/deploy-with-observability.yml'

env:
  SERVICE_VERSION: ${{ github.sha }}
  GATE_HEALTH_URL: http://localhost:3000/health
  GATE_METRICS_URL: http://localhost:3000/metrics
  GATE_MAX_ERROR_RATE: '0.05'
  GATE_MAX_LATENCY_MS: '500'
  GATE_SOAK_SECONDS: '3'

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: examples/node-api

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: examples/node-api/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: api-build
          path: |
            examples/node-api/dist
            examples/node-api/package.json
            examples/node-api/package-lock.json

  deploy-and-gate:
    name: Deploy · Observe · Decide
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: actions/download-artifact@v4
        with:
          name: api-build
          path: examples/node-api

      - name: Install production dependencies
        working-directory: examples/node-api
        run: npm ci --omit=dev

      - run: chmod +x examples/scripts/*.sh

      - name: Deploy release
        run: DEPLOY_VERSION="${{ github.sha }}" ./examples/scripts/deploy-mock.sh

      - name: Start API service
        working-directory: examples/node-api
        env:
          SERVICE_VERSION: ${{ github.sha }}
        run: |
          npm start &
          echo $! > /tmp/api.pid
          for i in $(seq 1 20); do
            curl -sf http://localhost:3000/health && break
            sleep 2
          done

      - name: Generate baseline traffic
        run: |
          for i in $(seq 1 10); do
            curl -sf http://localhost:3000/api/example > /dev/null
          done

      - name: Production Gate
        id: gate
        run: ./examples/scripts/production-gate.sh

      - name: Promote release
        if: success()
        run: echo "${{ github.sha }}" > .deploy-state/promoted-version

      - name: Rollback on gate failure
        if: failure() && steps.gate.outcome == 'failure'
        run: |
          ./examples/scripts/rollback.sh
          exit 1

      - name: Stop API
        if: always()
        run: kill "$(cat /tmp/api.pid)" 2>/dev/null || true
